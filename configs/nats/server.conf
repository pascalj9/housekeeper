# =============================================================================
# NATS server config (consumed by `nats-server -c <this-file>`).
# Reference: https://docs.nats.io/running-a-nats-service/configuration
#
# Housekeeper keeps this minimal:
#   - Bind to loopback only; the bus is internal and never needs LAN exposure.
#   - Enable JetStream so video.events can survive a restart.
#   - State path lives outside the repo and is set via $JS_STORE_DIR by the
#     service unit (NATS doesn't expand ~ in config files).
# =============================================================================

server_name: housekeeper

# Loopback only — fail loudly if something tries to expose this.
listen: "127.0.0.1:4222"

# Monitoring endpoint: http://127.0.0.1:8222/varz
http: "127.0.0.1:8222"

# Sensible client-side limits for a single-host bus.
max_payload: 8MB
max_pending: 64MB
max_connections: 256

# JetStream — durable persistence for video.events and any later durable
# streams. store_dir is supplied through the JS_STORE_DIR environment variable
# by the systemd unit / launchd plist (NATS substitutes $VAR but not ~).
jetstream {
  store_dir: $JS_STORE_DIR
  max_memory_store: 256MB
  max_file_store: 2GB
}

# Logging: defer to systemd / launchd to capture stdout/stderr.
logtime: true
debug: false
trace: false
