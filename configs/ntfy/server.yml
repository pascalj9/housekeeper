# =============================================================================
# ntfy server config (consumed by `ntfy serve --config <this-file>`).
# Reference: https://docs.ntfy.sh/config/
#
# Housekeeper keeps this file deliberately path-free — it is checked into git
# and must work on every developer's box. Per-host paths come from environment
# variables set by the systemd unit (Linux/WSL) or the launchd plist (macOS):
#
#   NTFY_CACHE_FILE             -> ~/.housekeeper/var/ntfy/cache.db
#   NTFY_ATTACHMENT_CACHE_DIR   -> ~/.housekeeper/var/ntfy/attachments
#
# Running ntfy directly? Set those env vars yourself, or pass --cache-file /
# --attachment-cache-dir on the command line.
#
# Edit `base-url` to your Tailnet name once Tailscale is up, e.g.
#   base-url: "http://housekeeper.<tailnet>.ts.net:8080"
# =============================================================================

listen-http: ":8080"
base-url: "http://localhost:8080"

# Attachments: keep them small and short-lived for snapshot pushes.
attachment-total-size-limit: "500M"
attachment-file-size-limit: "10M"
attachment-expiry-duration: "24h"

# Behaviour-of-record settings used by `housekeeper notify`.
visitor-message-daily-limit: 10000
keepalive-interval: "45s"

# Auth (disabled for v1, deny-all once enabled — Phase 8).
# auth-file: "~/.housekeeper/var/ntfy/auth.db"
# auth-default-access: "deny-all"
