# =============================================================================
# Housekeeper services registry
#
# Defaults for every local service Housekeeper talks to. Per-host overrides
# go in `configs/services.yaml.local` (gitignored), e.g. a generated ntfy
# topic. Both files are merged at load time by `housekeeper.services`.
# =============================================================================

ntfy:
  # Base URL of the ntfy server. We default to localhost so the system works
  # offline; once Tailscale is set up (Phase 0.5) you'll typically point this
  # at the Tailnet name (e.g. http://housekeeper.<tailnet>.ts.net:8080).
  endpoint: "http://127.0.0.1:8080"

  # Default topic. Override in services.yaml.local with a random secret
  # (`housekeeper notify init` generates one). Anyone with the topic name can
  # publish to the server, so keep the real topic out of git.
  topic: "housekeeper-default"

  # Optional bearer token for ntfy auth. v1 leaves this null; Phase 8
  # (Robustness & Ops) adds token-based access control.
  auth_token: null

nats:
  # NATS client URL. Loopback-only by default — the bus is internal and never
  # needs LAN exposure. Override in services.yaml.local for unusual setups.
  url: "nats://127.0.0.1:4222"

  # JetStream stream provisioned by `housekeeper bus init`. Holds video.events
  # for replay-after-restart.
  stream:
    name: "HOUSEKEEPER_VIDEO"
    subjects: ["video.events", "video.events.>"]
    max_age_seconds: 86400   # 24h retention
    max_bytes: 524288000     # 500 MB on disk

  # Reconnect tuning — defaults are deliberately patient; perception will hammer
  # the bus and we'd rather wait out a 5s blip than crash a worker.
  max_reconnect_attempts: -1   # forever
  reconnect_time_wait_seconds: 2
